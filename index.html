<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>全体カウンター</title>
</head>
<body>

<h1>カウンター</h1>
<p id="count">読み込み中...</p>

<button onclick="increment()">+1</button>
<button onclick="decrement()">-1</button>

<script>
/* ===== 設定（ここだけ書き換え） ===== */
const URL = "https://good-fawn-39790.upstash.io";
const TOKEN = "AZtuAAIncDE0YzJlNDk2M2RjOTQ0NjUxYTU0NTk2OWQ2YTgwNjVkM3AxMzk3OTA";
/* ================================== */

// 初期読み込み
async function load() {
  const res = await fetch(`${URL}/get/counter`, {
    headers: {
      Authorization: `Bearer ${TOKEN}`
    }
  });

  const data = await res.json();
  document.getElementById("count").innerText = data.result || 0;
}

// +1
async function increment() {
  const res = await fetch(`${URL}/incr/counter`, {
    headers: {
      Authorization: `Bearer ${TOKEN}`
    }
  });

  const data = await res.json();
  document.getElementById("count").innerText = data.result;
}

// -1
async function decrement() {
  const res = await fetch(`${URL}/decr/counter`, {
    headers: {
      Authorization: `Bearer ${TOKEN}`
    }
  });

  const data = await res.json();
  document.getElementById("count").innerText = data.result;
}

// ページ読み込み時
load();
</script>

</body>
</html>
